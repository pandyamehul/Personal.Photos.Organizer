{% extends "base.html" %}

{% block content %}

<h1>Map View</h1>

<div id="map"></div>

<link rel="stylesheet"
      href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([55.6, 12.6], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
}).addTo(map);

var points = {{ points | tojson }};

points.forEach(p => {
    if (!p.latitude || !p.longitude) return;

    L.marker([p.latitude, p.longitude])
     .addTo(map)
     .bindPopup(
        `<b>${p.city || 'Unknown'}</b><br>
        <a href="/image?path=${p.current_path}">
            Open
        </a>`
     );
});

</script>

{% endblock %}
