{% extends "base.html" %}

{% block content %}

<h1>Duplicate Review</h1>

{% for d in rows %}

<div class="dup">

    <img src="/thumbnail?path={{ d.source_path }}" width="150">

    <p>Duplicate:</p>
    <code>{{ d.source_path }}</code>

    <p>Original ID:</p>
    <code>{{ d.duplicate_of }}</code>

    <button onclick="deleteFile('{{ d.source_path }}')">
        Delete
    </button>

</div>

<hr>

{% endfor %}

{% endblock %}
